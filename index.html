<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Нонограммы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <h1>Нонограммы</h1>
      <button class="theme-toggle" id="themeToggle" title="Сменить тему" aria-label="Сменить тему">🌙</button>
    </div>

    <div class="level-card">
      <div class="level-header">
        <div class="level-title">
          <span class="level-emoji" id="levelEmoji">❤️</span>
          <div>
            <span class="level-name" id="levelName">Сердце</span>
            <span class="level-stars" id="levelStars">★☆☆</span>
          </div>
        </div>
        <div class="level-meta">
          <span class="tier-badge sub-easy" id="tierBadge">5×5 · Лёгкий</span>
          <span class="level-counter" id="levelCounter">1 / 12</span>
        </div>
      </div>
      <div class="level-progress">
        <div class="level-progress-fill" id="levelProgress"></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-chip">
        <div class="stat-label">Время</div>
        <div class="stat-value" id="timer">00:00</div>
      </div>
      <div class="stat-chip">
        <div class="stat-label">Ошибки</div>
        <div class="stat-value errors" id="errors">0</div>
      </div>
    </div>

    <div class="controls">
      <button class="primary" id="newGame">Заново</button>
    </div>

    <div class="difficulty-panel" id="difficultyPanel">
      <div class="diff-row">
        <span class="diff-row-label">5×5</span>
        <div class="diff-row-btns">
          <button class="diff-btn sub-easy active" data-size="5" data-stars="1"><span class="diff-stars">★</span><span class="diff-sub">Лёгкий</span></button>
          <button class="diff-btn sub-medium" data-size="5" data-stars="2"><span class="diff-stars">★★</span><span class="diff-sub">Средний</span></button>
          <button class="diff-btn sub-hard" data-size="5" data-stars="3"><span class="diff-stars">★★★</span><span class="diff-sub">Сложный</span></button>
        </div>
      </div>
      <div class="diff-row">
        <span class="diff-row-label">10×10</span>
        <div class="diff-row-btns">
          <button class="diff-btn sub-easy" data-size="10" data-stars="1"><span class="diff-stars">★</span><span class="diff-sub">Лёгкий</span></button>
          <button class="diff-btn sub-medium" data-size="10" data-stars="2"><span class="diff-stars">★★</span><span class="diff-sub">Средний</span></button>
          <button class="diff-btn sub-hard" data-size="10" data-stars="3"><span class="diff-stars">★★★</span><span class="diff-sub">Сложный</span></button>
        </div>
      </div>
      <div class="diff-row">
        <span class="diff-row-label">15×15</span>
        <div class="diff-row-btns">
          <button class="diff-btn sub-easy" data-size="15" data-stars="1"><span class="diff-stars">★</span><span class="diff-sub">Лёгкий</span></button>
          <button class="diff-btn sub-medium" data-size="15" data-stars="2"><span class="diff-stars">★★</span><span class="diff-sub">Средний</span></button>
          <button class="diff-btn sub-hard" data-size="15" data-stars="3"><span class="diff-stars">★★★</span><span class="diff-sub">Сложный</span></button>
        </div>
      </div>
    </div>

    <p class="hint-bar hint-desktop" id="hintDesktop">ЛКМ — закрасить · ПКМ — крестик · Перетаскивание — закраска строки</p>
    <p class="hint-bar hint-mobile" id="hintMobile">Выберите режим внизу · Проведите пальцем для закраски</p>

    <div class="game-wrapper" id="gameWrapper">
      <div class="nonogram" id="board"></div>
    </div>
  </div>

  <div class="mobile-toolbar" id="mobileToolbar">
    <button class="tool-btn active" data-mode="fill" aria-label="Закрасить">
      <span class="tool-icon">🖌️</span>
      <span class="tool-label">Закрасить</span>
    </button>
    <button class="tool-btn" data-mode="cross" aria-label="Крестик">
      <span class="tool-icon">✕</span>
      <span class="tool-label">Крестик</span>
    </button>
  </div>

  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <div class="win-preview" id="winPreview"></div>
      <h2 id="winTitle">Победа!</h2>
      <p class="win-subtitle" id="winSubtitle">Уровень пройден</p>
      <div class="win-stats">
        <div class="stat-chip">
          <div class="stat-label">Время</div>
          <div class="stat-value" id="winTime">00:00</div>
        </div>
        <div class="stat-chip">
          <div class="stat-label">Ошибки</div>
          <div class="stat-value errors" id="winErrors">0</div>
        </div>
      </div>
      <div class="win-actions">
        <button class="primary" id="nextLevel">Следующий уровень</button>
        <button id="playAgain">Повторить</button>
      </div>
    </div>
  </div>

  <script src="js/levels.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
